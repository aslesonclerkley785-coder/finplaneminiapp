<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Финансы</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
  /* Нейтральная база — цвет несут только цифры и статусы */
  --bg:#f2f3f5;
  --surface:#ffffff;
  --surface-2:#f7f8fa;
  --ink:#0e1116;
  --ink-2:#5b6472;
  --ink-3:#9aa3b0;
  --line:#e7e9ee;
  --accent:#2f6bff;
  --accent-soft:#eaf0ff;
  --pos:#12a05c;
  --pos-soft:#e6f6ee;
  --neg:#e5484d;
  --neg-soft:#fdecec;
  --warn:#c77d00;
  --radius:18px;
  --radius-sm:12px;
  --shadow:0 1px 2px rgba(16,20,30,.04),0 6px 20px rgba(16,20,30,.05);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0f1115; --surface:#171a20; --surface-2:#1e222a; --ink:#f4f6fa;
    --ink-2:#a3adba; --ink-3:#6b7480; --line:#262b34; --accent:#5e8bff;
    --accent-soft:#1b2740; --pos:#38d07f; --pos-soft:#15291f; --neg:#ff6b6f;
    --neg-soft:#2e1719; --warn:#e0a138; --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35);
  }
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:16px;line-height:1.35;-webkit-font-smoothing:antialiased;overscroll-behavior-y:none}
.num{font-variant-numeric:tabular-nums;letter-spacing:-.01em}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:16px}
::-webkit-scrollbar{width:0;height:0}

/* ---------- Каркас ---------- */
#app{max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:calc(96px + var(--safe-bottom))}
.topbar{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 82%,transparent);
  backdrop-filter:saturate(160%) blur(14px);-webkit-backdrop-filter:saturate(160%) blur(14px);
  padding:calc(10px + var(--safe-top)) 18px 10px;display:flex;align-items:center;gap:12px;min-height:52px}
.topbar h1{font-size:19px;font-weight:680;margin:0;letter-spacing:-.02em;flex:1}
.iconbtn{width:36px;height:36px;border-radius:12px;display:grid;place-items:center;color:var(--ink-2);
  background:var(--surface);box-shadow:var(--shadow);transition:transform .12s}
.iconbtn:active{transform:scale(.9)}
.iconbtn svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.back{margin:-6px 0 -6px -4px}

.wrap{padding:4px 16px 0}
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin:22px 4px 10px}
.section-head h2{font-size:15px;font-weight:660;margin:0;letter-spacing:-.01em}
.section-head .more{font-size:13.5px;color:var(--accent);font-weight:560}
.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}
.card+.card{margin-top:12px}
.muted{color:var(--ink-2)}
.tiny{font-size:12.5px;color:var(--ink-3)}

/* ---------- Главные цифры ---------- */
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stat{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 16px 14px}
.stat .lbl{font-size:13px;color:var(--ink-2);font-weight:520;display:flex;align-items:center;gap:6px}
.stat .dot{width:8px;height:8px;border-radius:50%}
.stat .val{font-size:26px;font-weight:720;margin-top:8px;letter-spacing:-.03em}
.stat.income .val{color:var(--pos)} .stat.income .dot{background:var(--pos)}
.stat.expense .val{color:var(--neg)} .stat.expense .dot{background:var(--neg)}
.stat .sub{font-size:12px;color:var(--ink-3);margin-top:3px}
.balance-line{display:flex;align-items:center;justify-content:space-between;margin-top:12px;
  padding:12px 16px;background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow)}
.balance-line .k{font-size:13.5px;color:var(--ink-2)}
.balance-line .v{font-size:17px;font-weight:680}

/* ---------- Недельный график ---------- */
.chart{padding:16px 14px 12px}
.chart-top{display:flex;justify-content:space-between;align-items:center;padding:0 2px 14px}
.chart-top .t{font-size:14px;font-weight:600}
.legend{display:flex;gap:12px;font-size:11.5px;color:var(--ink-2)}
.legend i{width:8px;height:8px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle}
.bars{display:flex;align-items:flex-end;justify-content:space-between;gap:6px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;
  border-radius:10px;padding:4px 2px 2px;transition:background .15s}
.bar-col:active{background:var(--surface-2)}
.bar-col.today{background:var(--surface-2)}
.bar-col.today .dow{color:var(--accent);font-weight:700}
.bar-plot{height:100px;width:100%;display:flex;align-items:flex-end;justify-content:center;gap:3px}
.bar{width:8px;max-width:42%;border-radius:4px 4px 2px 2px;min-height:3px;transition:height .35s cubic-bezier(.2,.8,.2,1)}
.bar.inc{background:var(--pos)}
.bar.exp{background:var(--neg)}
.bar.empty{background:var(--line);width:8px}
.dow{font-size:11px;color:var(--ink-3);font-weight:520}

/* ---------- Кнопки-переходы ---------- */
.pillrow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pill{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:15px 16px;
  display:flex;align-items:center;gap:12px;transition:transform .12s;text-align:left}
.pill:active{transform:scale(.97)}
.pill .ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;background:var(--accent-soft);color:var(--accent);flex:none}
.pill .ic svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.pill .tx b{display:block;font-size:15px;font-weight:620}
.pill .tx span{font-size:12px;color:var(--ink-3)}

/* ---------- Списки/строки ---------- */
.row{display:flex;align-items:center;gap:12px;padding:11px 0}
.row+.row{border-top:1px solid var(--line)}
.row .em{width:38px;height:38px;border-radius:11px;background:var(--surface-2);display:grid;place-items:center;font-size:18px;flex:none}
.row .grow{flex:1;min-width:0}
.row .grow b{font-size:14.5px;font-weight:560;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .grow span{font-size:12.5px;color:var(--ink-3)}
.row .amt{font-weight:640;font-size:15px;white-space:nowrap}
.amt.pos{color:var(--pos)} .amt.neg{color:var(--neg)}

/* ---------- Прогресс ---------- */
.pbar{height:7px;border-radius:6px;background:var(--surface-2);overflow:hidden;margin-top:8px}
.pbar>i{display:block;height:100%;border-radius:6px;background:var(--accent);transition:width .4s}
.pbar.over>i{background:var(--neg)}
.goal-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:15px 16px}
.goal-card+.goal-card{margin-top:12px}
.goal-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.goal-head b{font-size:15px;font-weight:620}
.ring{--p:0;width:44px;height:44px;border-radius:50%;flex:none;
  background:conic-gradient(var(--accent) calc(var(--p)*1%),var(--surface-2) 0);
  display:grid;place-items:center;font-size:11px;font-weight:700;color:var(--accent)}
.ring::before{content:"";position:absolute}
.ring span{background:var(--surface);width:34px;height:34px;border-radius:50%;display:grid;place-items:center}

/* ---------- Кнопки действий ---------- */
.btnrow{display:flex;gap:8px;margin-top:12px}
.btn{flex:1;padding:10px;border-radius:12px;font-size:13.5px;font-weight:600;text-align:center;background:var(--surface-2);color:var(--ink);transition:transform .1s}
.btn:active{transform:scale(.96)}
.btn.pos{background:var(--pos-soft);color:var(--pos)}
.btn.neg{background:var(--neg-soft);color:var(--neg)}
.btn.primary{background:var(--accent);color:#fff}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink-2)}

/* ---------- FAB ---------- */
.fab{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(20px + var(--safe-bottom));z-index:30;
  width:56px;height:56px;border-radius:50%;background:var(--accent);color:#fff;display:grid;place-items:center;
  box-shadow:0 8px 24px rgba(47,107,255,.4);transition:transform .14s}
.fab:active{transform:translateX(-50%) scale(.9)}
.fab svg{width:26px;height:26px;stroke:#fff;fill:none;stroke-width:2.4;stroke-linecap:round}
#view[data-view="summary"] ~ .fab{display:grid}

/* ---------- Модалка/шит ---------- */
.sheet-bg{position:fixed;inset:0;z-index:40;background:rgba(8,10,14,.42);opacity:0;pointer-events:none;transition:opacity .25s}
.sheet-bg.open{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:41;background:var(--surface);
  border-radius:22px 22px 0 0;transform:translateY(100%);transition:transform .3s cubic-bezier(.2,.85,.25,1);
  max-width:520px;margin:0 auto;max-height:92vh;overflow-y:auto;padding:8px 18px calc(22px + var(--safe-bottom))}
.sheet.open{transform:translateY(0)}
.grip{width:38px;height:4px;border-radius:3px;background:var(--line);margin:8px auto 6px}
.sheet h3{font-size:18px;font-weight:680;margin:6px 2px 16px;letter-spacing:-.02em}

/* ---------- Поля ввода ---------- */
.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;color:var(--ink-2);font-weight:560;margin:0 2px 6px}
.input{width:100%;background:var(--surface-2);border:1px solid transparent;border-radius:13px;padding:13px 14px;color:var(--ink);outline:none;transition:border-color .15s}
.input:focus{border-color:var(--accent)}
.amount-input{font-size:34px;font-weight:720;text-align:center;letter-spacing:-.03em;padding:8px;background:transparent}
.seg{display:flex;background:var(--surface-2);border-radius:13px;padding:4px;gap:4px}
.seg button{flex:1;padding:9px;border-radius:10px;font-size:14px;font-weight:600;color:var(--ink-2);transition:.15s}
.seg button.on{background:var(--surface);color:var(--ink);box-shadow:var(--shadow)}
.seg button.on.pos{color:var(--pos)} .seg button.on.neg{color:var(--neg)}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:9px 13px;border-radius:11px;background:var(--surface-2);font-size:13.5px;font-weight:520;display:flex;align-items:center;gap:6px;transition:.12s}
.chip.on{background:var(--accent-soft);color:var(--accent);box-shadow:inset 0 0 0 1.5px var(--accent)}
.chip:active{transform:scale(.95)}

/* ---------- Аналитика ---------- */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.kpi{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px}
.kpi .k{font-size:12px;color:var(--ink-2);font-weight:520}
.kpi .v{font-size:20px;font-weight:700;margin-top:6px;letter-spacing:-.02em}
.kpi .d{font-size:12px;font-weight:600;margin-top:3px}
.d.up{color:var(--neg)} .d.down{color:var(--pos)}
.cat-row{display:flex;align-items:center;gap:12px;padding:9px 0}
.cat-row+.cat-row{border-top:1px solid var(--line)}
.cat-row .em{width:34px;height:34px;border-radius:10px;background:var(--surface-2);display:grid;place-items:center;font-size:16px;flex:none}
.cat-row .cbody{flex:1;min-width:0}
.cat-row .cbody .ct{display:flex;justify-content:space-between;font-size:14px;font-weight:540}
.cat-row .cbody .ct .cp{color:var(--ink-3);font-weight:520;font-size:12.5px}
.mini-bar{height:6px;border-radius:4px;background:var(--surface-2);margin-top:6px;overflow:hidden}
.mini-bar>i{display:block;height:100%;background:var(--accent);border-radius:4px}

.tabs{display:flex;gap:6px;background:var(--surface-2);padding:4px;border-radius:12px;margin:0 4px 4px}
.tabs button{flex:1;padding:8px;border-radius:9px;font-size:13px;font-weight:600;color:var(--ink-2)}
.tabs button.on{background:var(--surface);color:var(--ink);box-shadow:var(--shadow)}

.empty{text-align:center;padding:34px 20px;color:var(--ink-3)}
.empty .e-ic{font-size:32px;margin-bottom:8px;opacity:.6}
.empty b{display:block;color:var(--ink-2);font-weight:560;font-size:14.5px;margin-bottom:4px}
.empty span{font-size:13px}

.badge{font-size:11px;font-weight:640;padding:3px 8px;border-radius:20px}
.badge.pos{background:var(--pos-soft);color:var(--pos)}
.badge.neg{background:var(--neg-soft);color:var(--neg)}
.badge.warn{background:#fff3e0;color:var(--warn)}
@media (prefers-color-scheme:dark){.badge.warn{background:#3a2c12}}
.badge.soft{background:var(--surface-2);color:var(--ink-2)}

.list-add{display:flex;align-items:center;gap:8px;justify-content:center;padding:13px;color:var(--accent);
  font-size:14px;font-weight:600;background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);
  border:1px dashed var(--line);margin-top:12px}
.list-add:active{transform:scale(.98)}
.fade{animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.swatch{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:7px;vertical-align:middle}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <button class="iconbtn back" id="backBtn" style="display:none" aria-label="Назад">
      <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <h1 id="title">Сводка</h1>
    <button class="iconbtn" id="settingsBtn" aria-label="Настройки">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
  <div id="view" data-view="summary"></div>
</div>

<button class="fab" id="fab" aria-label="Добавить операцию">
  <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
</button>

<div class="sheet-bg" id="sheetBg"></div>
<div class="sheet" id="sheet"></div>

<script>
/* ============================================================
   ХРАНИЛИЩЕ
   В превью Claude используется window.storage (переживает перезапуск).
   Для деплоя в Telegram замените методы на CloudStorage — см. блок ниже.
   ============================================================ */
const KEY='fin_state_v1';
const TG=window.Telegram?.WebApp;
const inTG=()=>!!(TG&&TG.initData&&TG.initData.length);
const CHUNK=3500; // лимит одного значения CloudStorage ~4096 символов
const csSet=(k,v)=>new Promise(r=>{try{TG.CloudStorage.setItem(k,v,(e,ok)=>r(!e&&ok));}catch(e){r(false);}});
const csGet=k=>new Promise(r=>{try{TG.CloudStorage.getItem(k,(e,v)=>r(e?null:v));}catch(e){r(null);}});
async function cloudSave(s){
  const parts=[];for(let i=0;i<s.length;i+=CHUNK)parts.push(s.slice(i,i+CHUNK));
  if(!await csSet(KEY+'_n',String(parts.length)))return false;
  for(let i=0;i<parts.length;i++){if(!await csSet(KEY+'_'+i,parts[i]))return false;}
  return true;
}
async function cloudLoad(){
  const n=parseInt(await csGet(KEY+'_n')||'0',10);if(!n)return null;
  let s='';for(let i=0;i<n;i++){const p=await csGet(KEY+'_'+i);if(p==null)return null;s+=p;}
  try{return JSON.parse(s);}catch(e){return null;}
}
const Store={
  async load(){
    if(inTG()&&TG.CloudStorage){const d=await cloudLoad();if(d)return d;}
    if(window.storage){try{const r=await window.storage.get(KEY);if(r&&r.value)return JSON.parse(r.value);}catch(e){}}
    try{const v=localStorage.getItem(KEY);if(v)return JSON.parse(v);}catch(e){}
    return null;
  },
  async save(d){
    const s=JSON.stringify(d);
    if(inTG()&&TG.CloudStorage){try{await cloudSave(s);}catch(e){}}
    if(window.storage){try{await window.storage.set(KEY,s);}catch(e){}}
    try{localStorage.setItem(KEY,s);}catch(e){}
  }
};

/* ---------- утилиты ---------- */
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const now=()=>new Date();
const iso=d=>d.toISOString().slice(0,10);
const parse=s=>new Date(s+'T00:00:00');
const fmt=(n)=>{const a=Math.round(Math.abs(n));return (n<0?'−':'')+a.toLocaleString('ru-RU')+' ₽';};
const fmtSign=(n)=>(n>0?'+':n<0?'−':'')+Math.round(Math.abs(n)).toLocaleString('ru-RU')+' ₽';
const monthName=d=>d.toLocaleDateString('ru-RU',{month:'long',year:'numeric'});
const sameMonth=(a,b)=>a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth();
const daysInMonth=d=>new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
function startOfWeek(d){const x=new Date(d);const dow=(x.getDay()+6)%7;x.setDate(x.getDate()-dow);x.setHours(0,0,0,0);return x;}
function haptic(t='light'){try{TG?.HapticFeedback?.impactOccurred(t);}catch(e){}}
function hSel(){try{TG?.HapticFeedback?.selectionChanged();}catch(e){}}

const CATS={
  expense:[['Продукты','🛒'],['Транспорт','🚕'],['Кафе','☕'],['Дом','🏠'],['Развлечения','🎬'],
    ['Здоровье','💊'],['Подписки','📱'],['Одежда','👕'],['Образование','📚'],['Прочее','•']],
  income:[['Зарплата','💼'],['Фриланс','💻'],['Продажи','🏷️'],['Проценты','📈'],['Возврат','↩️'],['Прочее','•']]
};
const emoji=(type,cat)=>{const l=CATS[type]||[];const f=l.find(c=>c[0]===cat);return f?f[1]:'•';};

/* ---------- состояние ---------- */
let S=null;

function seed(){
  const t=now(), tx=[];
  const add=(daysAgo,type,cat,amount,note='')=>{const d=new Date(t);d.setDate(d.getDate()-daysAgo);
    tx.push({id:uid(),type,cat,amount,note,date:iso(d)});};
  add(0,'expense','Кафе',420);add(0,'expense','Транспорт',180);
  add(1,'expense','Продукты',2340);add(1,'expense','Подписки',699,'Музыка');
  add(2,'income','Фриланс',18000,'Презентация клиенту');add(2,'expense','Кафе',560);
  add(3,'expense','Продукты',1890);add(3,'expense','Развлечения',1200);
  add(4,'expense','Транспорт',260);add(5,'expense','Дом',3400,'Хозтовары');
  add(6,'expense','Продукты',2100);add(8,'income','Продажи',7500,'FunPay');
  add(10,'expense','Здоровье',1450);add(12,'expense','Одежда',4200);
  add(15,'income','Зарплата',65000);add(15,'expense','Дом',35000,'Аренда');
  return {
    tx,
    goals:[
      {id:uid(),name:'Подушка безопасности',target:150000,saved:82000,history:[]},
      {id:uid(),name:'MacBook Pro',target:220000,saved:41000,history:[]}
    ],
    budget:{blocks:[
      {id:uid(),name:'Продукты',cat:'Продукты',planned:18000},
      {id:uid(),name:'Кафе и рестораны',cat:'Кафе',planned:6000},
      {id:uid(),name:'Транспорт',cat:'Транспорт',planned:4000},
      {id:uid(),name:'Развлечения',cat:'Развлечения',planned:8000}
    ]},
    planned:[
      {id:uid(),name:'Аренда квартиры',amount:35000,type:'expense',day:5,notify:true,before:3,paidMonth:null},

/* ============================================================
   ВЫЧИСЛЕНИЯ
   ============================================================ */
function monthTotals(ref=now()){
  let inc=0,exp=0;
  S.tx.forEach(t=>{if(sameMonth(parse(t.date),ref)){t.type==='income'?inc+=t.amount:exp+=t.amount;}});
  return {inc,exp,net:inc-exp};
}
function weekData(){
  const s=startOfWeek(now()),days=[];
  for(let i=0;i<7;i++){const d=new Date(s);d.setDate(s.getDate()+i);
    days.push({date:d,iso:iso(d),inc:0,exp:0});}
  S.tx.forEach(t=>{const d=days.find(x=>x.iso===t.date);if(d){t.type==='income'?d.inc+=t.amount:d.exp+=t.amount;}});
  return days;
}
function categoryBreakdown(type='expense',ref=now()){
  const m={};let total=0;
  S.tx.forEach(t=>{if(t.type===type&&sameMonth(parse(t.date),ref)){m[t.cat]=(m[t.cat]||0)+t.amount;total+=t.amount;}});
  return {list:Object.entries(m).map(([cat,sum])=>({cat,sum,pct:total?sum/total*100:0})).sort((a,b)=>b.sum-a.sum),total};
}
function forecast(){
  const t=now(),dim=daysInMonth(t),dp=t.getDate();
  const {exp}=monthTotals();
  return {projected:dp?exp/dp*dim:0,avg:dp?exp/dp:0,dim,dp};
}

  else{stack.push(view);}
  params=p;render();
}
function back(){if(stack.length>1){stack.pop();hSel();render();}}
function render(){
  const v=stack[stack.length-1];
  V.dataset.view=v;
  BACK.style.display=stack.length>1?'grid':'none';
  document.getElementById('settingsBtn').style.display=stack.length>1?'none':'grid';
  document.getElementById('fab').style.display=v==='summary'?'grid':'none';
  if(TG?.BackButton){stack.length>1?TG.BackButton.show():TG.BackButton.hide();}

        ${eh?`<div class="bar exp" style="height:${eh}px"></div>`:''}

      <div class="chart-top"><span class="t">Эта неделя</span>
        <span class="legend"><span><i style="background:var(--pos)"></i>доход</span><span><i style="background:var(--neg)"></i>расход</span></span></div>
      <div class="bars">${bars}</div>
    </div>

    <div class="pillrow" style="margin-top:12px">
      <button class="pill" onclick="nav('analytics')"><span class="ic">
        <svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg></span>

  const savings=cur.inc?((cur.inc-cur.exp)/cur.inc*100):0;
  const largest=[...S.tx].filter(t=>t.type==='expense'&&sameMonth(parse(t.date),now())).sort((a,b)=>b.amount-a.amount)[0];

  const catList=cb.list.length?cb.list.map(c=>`

      </div></div>`).join(''):`<div class="empty" style="padding:20px"><b>Нет данных за месяц</b></div>`;

        <div class="d">${savings>=20?'отличный темп':savings>=0?'можно лучше':'расходы > доходов'}</div></div>
      <div class="kpi"><div class="k">В среднем в день</div><div class="v num">${fmt(f.avg)}</div>
        <div class="d">${f.dp} из ${f.dim} дней</div></div>
      <div class="kpi"><div class="k">Расходы к пр. месяцу</div><div class="v num">${momExp>0?'+':''}${momExp.toFixed(0)}%</div>
        <div class="d ${momExp>0?'up':'down'}">${prev.exp?fmt(prev.exp)+' было':'нет данных'}</div></div>

    ${top?`<div class="card" style="margin-top:12px;display:flex;align-items:center;gap:12px">

      <div class="em" style="width:40px;height:40px;border-radius:12px;background:var(--surface-2);display:grid;place-items:center;font-size:19px">💥</div>

/* ---------- Запланированные ---------- */

    return {...p,next};
  }).sort((a,b)=>a.next-b.next);
}

  setTitle();
  const list=upcomingPlanned();

  }).join(''):`<div class="card"><div class="empty"><div class="e-ic">📅</div><b>Нет платежей</b><span>Аренда, связь, подписки</span></div></div>`;
  V.innerHTML=`<div class="wrap">
    <div class="tiny" style="margin:4px 4px 12px">Регулярные списания и поступления. Уведомления приходят из вашего Telegram-бота — Mini App хранит настройку, а фактический push отправляет бот-бэкенд.</div>
    ${body}
    <div class="list-add" onclick="editPlanned()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>Добавить платёж</div>
  </div>`;
}

/* ---------- Долги ---------- */
let debtPeriod=30;
function debtChange(d,days){
  if(!d.history||d.history.length<2) return null;
  const cutoff=days?new Date(Date.now()-days*864e5):null;
  let base;
  if(cutoff){const past=d.history.filter(h=>parse(h.date)<=cutoff);base=past.length?past[past.length-1]:d.history[0];}
  else base=d.history[0];
  const cur=d.history[d.history.length-1];
  if(!base||base.amount===0) return null;
  return (cur.amount-base.amount)/base.amount*100;
}
function rDebts(){
  setTitle();
  let owe=0,owed=0;S.debts.forEach(d=>d.dir==='i_owe'?owe+=d.amount:owed+=d.amount);
  const cards=S.debts.map(d=>{
    const ch=debtChange(d,debtPeriod);
    const good=(d.dir==='i_owe'&&ch<0)||(d.dir==='owed_to_me'&&ch<0);
    return `<div class="card" style="padding:14px 16px" onclick="editDebt('${d.id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><span class="badge ${d.dir==='i_owe'?'neg':'pos'}">${d.dir==='i_owe'?'я должен':'мне должны'}</span>
          <b style="font-size:15px;display:block;margin-top:6px">${d.name}</b></div>
        <div class="num" style="font-size:19px;font-weight:720;color:${d.dir==='i_owe'?'var(--neg)':'var(--pos)'}">${fmt(d.amount)}</div>
      </div>
      ${ch!==null?`<div style="display:flex;align-items:center;gap:8px;margin-top:10px">
        <span class="badge ${good?'pos':'neg'}">${ch>0?'▲':'▼'} ${Math.abs(ch).toFixed(0)}%</span>
        <span class="tiny">за ${debtPeriod?debtPeriod+' дн.':'всё время'}</span></div>`:`<div class="tiny" style="margin-top:8px">Недостаточно истории для динамики</div>`}
    </div>`;
  }).join('');
  V.innerHTML=`<div class="wrap">
    <div class="summary-grid">
      <div class="stat expense"><div class="lbl"><span class="dot"></span>Я должен</div><div class="val num">${fmt(owe)}</div></div>
      <div class="stat income"><div class="lbl"><span class="dot"></span>Мне должны</div><div class="val num">${fmt(owed)}</div></div>
    </div>
    <div class="balance-line"><span class="k">Чистый баланс</span><span class="v num" style="color:${owed-owe>=0?'var(--pos)':'var(--neg)'}">${fmtSign(owed-owe)}</span></div>
    <div class="tabs" style="margin-top:16px">
      <button class="${debtPeriod===30?'on':''}" onclick="debtPeriod=30;render()">30 дней</button>
      <button class="${debtPeriod===90?'on':''}" onclick="debtPeriod=90;render()">90 дней</button>
      <button class="${debtPeriod===0?'on':''}" onclick="debtPeriod=0;render()">Всё время</button>
    </div>
    ${S.debts.length?cards:`<div class="card"><div class="empty"><div class="e-ic">🤝</div><b>Долгов нет</b></div></div>`}
    <div class="list-add" onclick="editDebt()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>Добавить долг</div>
  </div>`;
}

/* ============================================================
   ШИТЫ (модальные окна)
   ============================================================ */
const SB=document.getElementById('sheetBg'),SH=document.getElementById('sheet');
function openSheet(html){SH.innerHTML=`<div class="grip"></div>`+html;SB.classList.add('open');SH.classList.add('open');haptic();}
function closeSheet(){SB.classList.remove('open');SH.classList.remove('open');}
SB.onclick=closeSheet;

/* --- Добавить/изменить операцию --- */
let draft={};
function openTxSheet(existing){
  draft=existing?{...existing}:{type:'expense',amount:'',cat:CATS.expense[0][0],date:iso(now()),note:''};
  renderTxSheet();
}
function renderTxSheet(){
  const cats=CATS[draft.type].map(c=>`<button class="chip ${draft.cat===c[0]?'on':''}" onclick="draft.cat='${c[0]}';renderTxSheet()">${c[1]} ${c[0]}</button>`).join('');
  openSheet(`
    <h3>${draft.id?'Операция':'Новая операция'}</h3>
    <div class="seg" style="margin-bottom:16px">
      <button class="${draft.type==='expense'?'on neg':''}" onclick="draft.type='expense';draft.cat=CATS.expense[0][0];renderTxSheet()">Расход</button>
      <button class="${draft.type==='income'?'on pos':''}" onclick="draft.type='income';draft.cat=CATS.income[0][0];renderTxSheet()">Доход</button>
    </div>
    <input class="input amount-input" id="txAmt" inputmode="numeric" placeholder="0 ₽" value="${draft.amount||''}"
      style="color:${draft.type==='income'?'var(--pos)':'var(--neg)'}" oninput="draft.amount=this.value.replace(/[^0-9]/g,'')">
    <div class="field" style="margin-top:14px"><label>Категория</label><div class="chips">${cats}</div></div>
    <div class="field"><label>Дата</label><input class="input" type="date" value="${draft.date}" onchange="draft.date=this.value"></div>
    <div class="field"><label>Заметка</label><input class="input" placeholder="Необязательно" value="${draft.note||''}" oninput="draft.note=this.value"></div>
    <div class="btnrow">
      ${draft.id?`<button class="btn neg" onclick="delTx('${draft.id}')">Удалить</button>`:''}
      <button class="btn primary" onclick="saveTx()">${draft.id?'Сохранить':'Добавить'}</button>
    </div>`);
  setTimeout(()=>{if(!draft.id)document.getElementById('txAmt')?.focus();},250);
}
function openTx(id){openTxSheet(S.tx.find(t=>t.id===id));}
function saveTx(){
  const amt=parseInt(draft.amount||0);if(!amt){haptic('rigid');return;}
  if(draft.id){const t=S.tx.find(x=>x.id===draft.id);Object.assign(t,{type:draft.type,amount:amt,cat:draft.cat,date:draft.date,note:draft.note});}
  else S.tx.push({id:uid(),type:draft.type,amount:amt,cat:draft.cat,date:draft.date,note:draft.note});
  persist();closeSheet();render();haptic('soft');
}
function delTx(id){S.tx=S.tx.filter(t=>t.id!==id);persist();closeSheet();render();haptic('rigid');}

/* --- Цель --- */
let gDraft={};
function editGoal(id){gDraft=id?{...S.goals.find(g=>g.id===id)}:{name:'',target:'',saved:0,history:[]};
  openSheet(`<h3>${gDraft.id?'Цель':'Новая цель'}</h3>
    <div class="field"><label>Название</label><input class="input" placeholder="Например, отпуск" value="${gDraft.name||''}" oninput="gDraft.name=this.value"></div>
    <div class="field"><label>Сумма цели</label><input class="input num" inputmode="numeric" placeholder="0 ₽" value="${gDraft.target||''}" oninput="gDraft.target=this.value.replace(/[^0-9]/g,'')"></div>
    <div class="field"><label>Уже накоплено</label><input class="input num" inputmode="numeric" placeholder="0 ₽" value="${gDraft.saved||''}" oninput="gDraft.saved=this.value.replace(/[^0-9]/g,'')"></div>
    <div class="btnrow">${gDraft.id?`<button class="btn neg" onclick="delGoal('${gDraft.id}')">Удалить</button>`:''}
      <button class="btn primary" onclick="saveGoal()">Сохранить</button></div>`);
}
function saveGoal(){if(!gDraft.name||!gDraft.target){haptic('rigid');return;}
  if(gDraft.id){Object.assign(S.goals.find(g=>g.id===gDraft.id),{name:gDraft.name,target:+gDraft.target,saved:+gDraft.saved||0});}
  else S.goals.push({id:uid(),name:gDraft.name,target:+gDraft.target,saved:+gDraft.saved||0,history:[]});
  persist();closeSheet();render();haptic('soft');}
function delGoal(id){S.goals=S.goals.filter(g=>g.id!==id);persist();closeSheet();render();}
function openGoal(id){const g=S.goals.find(x=>x.id===id);const p=g.target?Math.min(100,g.saved/g.target*100):0;
  const hist=(g.history||[]).slice(-5).reverse().map(h=>`<div class="row" style="padding:8px 0"><div class="em">${h.type==='in'?'📥':'📤'}</div>
    <div class="grow"><b>${h.type==='in'?'Пополнение':'Вывод'}</b><span>${parse(h.date).toLocaleDateString('ru-RU',{day:'numeric',month:'short'})}</span></div>
    <div class="amt ${h.type==='in'?'pos':'neg'} num">${h.type==='in'?'+':'−'}${h.amount.toLocaleString('ru-RU')} ₽</div></div>`).join('');
  openSheet(`<h3>${g.name}</h3>
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:8px">
      <div class="ring" style="--p:${p};width:64px;height:64px;position:relative;font-size:14px"><span class="num">${Math.round(p)}%</span></div>
      <div><div class="num" style="font-size:22px;font-weight:720">${fmt(g.saved)}</div><div class="tiny">из ${fmt(g.target)} · осталось ${fmt(Math.max(0,g.target-g.saved))}</div></div>
    </div>
    <div class="btnrow">
      <button class="btn pos" onclick="goalMove('${id}','in')">＋ Пополнить</button>
      <button class="btn neg" onclick="goalMove('${id}','out')">− Вывести</button>
      <button class="btn ghost" style="flex:none;padding:10px 14px" onclick="editGoal('${id}')">✎</button></div>
    ${hist?`<div class="section-head"><h2>Движения</h2></div><div class="card">${hist}</div>`:''}`);
}
function goalMove(id,type){const g=S.goals.find(x=>x.id===id);
  openSheet(`<h3>${type==='in'?'Пополнить цель':'Вывести с цели'}</h3>
    <div class="tiny" style="margin:0 2px 12px">${g.name} · сейчас ${fmt(g.saved)}</div>
    <input class="input amount-input" id="gm" inputmode="numeric" placeholder="0 ₽" style="color:${type==='in'?'var(--pos)':'var(--neg)'}">
    <div class="btnrow"><button class="btn primary" onclick="doGoalMove('${id}','${type}')">Подтвердить</button></div>`);
  setTimeout(()=>document.getElementById('gm')?.focus(),250);}
function doGoalMove(id,type){const v=parseInt((document.getElementById('gm').value||'').replace(/[^0-9]/g,''));if(!v){haptic('rigid');return;}
  const g=S.goals.find(x=>x.id===id);g.saved=Math.max(0,g.saved+(type==='in'?v:-v));
  (g.history=g.history||[]).push({type,amount:v,date:iso(now())});persist();closeSheet();render();haptic('soft');}

/* --- Блок бюджета --- */
let bDraft={};
function editBlock(id){bDraft=id?{...S.budget.blocks.find(b=>b.id===id)}:{name:'',cat:CATS.expense[0][0],planned:''};
  const cats=CATS.expense.map(c=>`<button class="chip ${bDraft.cat===c[0]?'on':''}" onclick="bDraft.cat='${c[0]}';document.getElementById('bn').value=bDraft.name||'${c[0]}';editBlockRefresh('${c[0]}')">${c[1]} ${c[0]}</button>`).join('');
  openSheet(`<h3>${bDraft.id?'Блок бюджета':'Новый блок'}</h3>
    <div class="field"><label>Название</label><input class="input" id="bn" placeholder="Например, Продукты" value="${bDraft.name||''}" oninput="bDraft.name=this.value"></div>
    <div class="field"><label>Категория расходов</label><div class="chips">${cats}</div></div>
    <div class="field"><label>Лимит на месяц</label><input class="input num" inputmode="numeric" placeholder="0 ₽" value="${bDraft.planned||''}" oninput="bDraft.planned=this.value.replace(/[^0-9]/g,'')"></div>
    <div class="btnrow">${bDraft.id?`<button class="btn neg" onclick="delBlock('${bDraft.id}')">Удалить</button>`:''}
      <button class="btn primary" onclick="saveBlock()">Сохранить</button></div>`);}
function editBlockRefresh(cat){if(!bDraft.name)bDraft.name=cat;renderSheetChips();}
function renderSheetChips(){/* перерисовка чипов */ editBlock(bDraft.id);}
function saveBlock(){bDraft.name=bDraft.name||bDraft.cat;if(!bDraft.planned){haptic('rigid');return;}
  if(bDraft.id)Object.assign(S.budget.blocks.find(b=>b.id===bDraft.id),{name:bDraft.name,cat:bDraft.cat,planned:+bDraft.planned});
  else S.budget.blocks.push({id:uid(),name:bDraft.name,cat:bDraft.cat,planned:+bDraft.planned});
  persist();closeSheet();render();haptic('soft');}
function delBlock(id){S.budget.blocks=S.budget.blocks.filter(b=>b.id!==id);persist();closeSheet();render();}

/* --- Запланированный платёж --- */
let pDraft={};
function editPlanned(id){pDraft=id?{...S.planned.find(p=>p.id===id)}:{name:'',amount:'',type:'expense',day:1,notify:true,before:3};
  openSheet(`<h3>${pDraft.id?'Платёж':'Новый платёж'}</h3>
    <div class="seg" style="margin-bottom:16px">
      <button class="${pDraft.type==='expense'?'on neg':''}" onclick="pDraft.type='expense';editPlanned('${id||''}')">Списание</button>
      <button class="${pDraft.type==='income'?'on pos':''}" onclick="pDraft.type='income';editPlanned('${id||''}')">Поступление</button></div>
    <div class="field"><label>Название</label><input class="input" placeholder="Аренда, связь, подписка" value="${pDraft.name||''}" oninput="pDraft.name=this.value"></div>
    <div class="field"><label>Сумма</label><input class="input num" inputmode="numeric" placeholder="0 ₽" value="${pDraft.amount||''}" oninput="pDraft.amount=this.value.replace(/[^0-9]/g,'')"></div>
    <div class="field"><label>День месяца</label><input class="input num" inputmode="numeric" type="number" min="1" max="31" value="${pDraft.day||1}" oninput="pDraft.day=Math.min(31,Math.max(1,+this.value||1))"></div>
    <div class="field"><label>Напоминание</label>
      <div class="seg"><button class="${pDraft.notify?'on':''}" onclick="pDraft.notify=true;editPlanned('${id||''}')">Включено</button>
        <button class="${!pDraft.notify?'on':''}" onclick="pDraft.notify=false;editPlanned('${id||''}')">Выключено</button></div></div>
    ${pDraft.notify?`<div class="field"><label>За сколько дней уведомить</label>
      <div class="chips">${[0,1,2,3,5,7].map(n=>`<button class="chip ${(+pDraft.before)===n?'on':''}" onclick="pDraft.before=${n};editPlanned('${id||''}')">${n===0?'в день':'за '+n+' дн.'}</button>`).join('')}</div></div>`:''}
    <div class="btnrow">${pDraft.id?`<button class="btn neg" onclick="delPlanned('${pDraft.id}')">Удалить</button>`:''}
      <button class="btn primary" onclick="savePlanned()">Сохранить</button></div>`);}
function savePlanned(){if(!pDraft.name||!pDraft.amount){haptic('rigid');return;}
  const data={name:pDraft.name,amount:+pDraft.amount,type:pDraft.type,day:+pDraft.day||1,notify:!!pDraft.notify,before:+pDraft.before||0};
  if(pDraft.id)Object.assign(S.planned.find(p=>p.id===pDraft.id),data);
  else S.planned.push({id:uid(),...data,paidMonth:null});
  persist();closeSheet();render();haptic('soft');}
function delPlanned(id){S.planned=S.planned.filter(p=>p.id!==id);persist();closeSheet();render();}
function payPlanned(id){const p=S.planned.find(x=>x.id===id);
  S.tx.push({id:uid(),type:p.type,amount:p.amount,cat:p.type==='income'?'Прочее':'Дом',date:iso(now()),note:p.name});
  persist();render();haptic('soft');
  openSheet(`<h3>Операция проведена</h3><div class="tiny" style="margin:0 2px 16px">«${p.name}» на ${fmt(p.amount)} добавлена в историю за сегодня.</div><div class="btnrow"><button class="btn primary" onclick="closeSheet()">Готово</button></div>`);}

/* --- Долг --- */
let dDraft={};
function editDebt(id){dDraft=id?{...S.debts.find(d=>d.id===id)}:{name:'',dir:'i_owe',amount:'',history:[]};
  const d=id?S.debts.find(x=>x.id===id):null;
  const hist=d&&d.history?d.history.slice().reverse().map(h=>`<div class="row" style="padding:7px 0"><div class="grow"><span>${parse(h.date).toLocaleDateString('ru-RU',{day:'numeric',month:'short',year:'2-digit'})}</span></div><div class="num amt">${fmt(h.amount)}</div></div>`).join(''):'';
  openSheet(`<h3>${dDraft.id?'Долг':'Новый долг'}</h3>
    <div class="seg" style="margin-bottom:16px">
      <button class="${dDraft.dir==='i_owe'?'on neg':''}" onclick="dDraft.dir='i_owe';editDebt('${id||''}')">Я должен</button>
      <button class="${dDraft.dir==='owed_to_me'?'on pos':''}" onclick="dDraft.dir='owed_to_me';editDebt('${id||''}')">Мне должны</button></div>
    <div class="field"><label>Кому / кто</label><input class="input" placeholder="Банк, имя" value="${dDraft.name||''}" oninput="dDraft.name=this.value"></div>
    <div class="field"><label>Текущая сумма</label><input class="input num" inputmode="numeric" placeholder="0 ₽" value="${dDraft.amount||''}" oninput="dDraft.amount=this.value.replace(/[^0-9]/g,'')"></div>
    <div class="tiny" style="margin:-4px 2px 12px">Каждое изменение суммы записывается в историю — по ней строится динамика в %.</div>
    <div class="btnrow">${dDraft.id?`<button class="btn neg" onclick="delDebt('${dDraft.id}')">Удалить</button>`:''}
      <button class="btn primary" onclick="saveDebt()">Сохранить</button></div>
    ${hist?`<div class="section-head"><h2>История суммы</h2></div><div class="card">${hist}</div>`:''}`);}
function saveDebt(){if(!dDraft.name||dDraft.amount===''){haptic('rigid');return;}
  const amt=+dDraft.amount;
  if(dDraft.id){const d=S.debts.find(x=>x.id===dDraft.id);d.name=dDraft.name;d.dir=dDraft.dir;
    if(d.amount!==amt){d.amount=amt;(d.history=d.history||[]).push({date:iso(now()),amount:amt});}}
  else S.debts.push({id:uid(),name:dDraft.name,dir:dDraft.dir,amount:amt,history:[{date:iso(now()),amount:amt}]});
  persist();closeSheet();render();haptic('soft');}
function delDebt(id){S.debts=S.debts.filter(d=>d.id!==id);persist();closeSheet();render();}

/* --- Настройки --- */
document.getElementById('settingsBtn').onclick=()=>{
  openSheet(`<h3>Настройки</h3>
    <div class="card" style="box-shadow:none;background:var(--surface-2)">
      <div class="row" style="padding:8px 0" onclick="if(confirm('Заполнить демо-данными? Текущие данные будут заменены.')){resetSeed()}"><div class="em">✨</div><div class="grow"><b>Загрузить пример</b><span>Демо-данные для оценки</span></div></div>
      <div class="row" style="padding:8px 0" onclick="if(confirm('Удалить все данные без возможности восстановления?')){wipe()}"><div class="em">🗑️</div><div class="grow"><b style="color:var(--neg)">Очистить всё</b><span>Удалить все операции и настройки</span></div></div>
    </div>
    <div class="tiny" style="margin:14px 4px 0">Данные сохраняются автоматически: в Telegram — в облаке (CloudStorage), в браузере — локально. Уведомления по платежам отправляет ваш бот-бэкенд.</div>`);
};
function resetSeed(){S=seed();persist();closeSheet();nav('summary');}
function wipe(){S={tx:[],goals:[],budget:{blocks:[]},planned:[],debts:[]};persist();closeSheet();nav('summary');}

/* ============================================================
   ИНИЦИАЛИЗАЦИЯ
   ============================================================ */
async function persist(){await Store.save(S);}
document.getElementById('fab').onclick=()=>openTxSheet();
BACK.onclick=back;
if(TG){try{TG.ready();TG.expand();TG.BackButton?.onClick(back);
  const tp=TG.themeParams||{};
  if(tp.bg_color){document.documentElement.style.setProperty('--bg',tp.secondary_bg_color||tp.bg_color);
    document.documentElement.style.setProperty('--surface',tp.bg_color);
    if(tp.text_color)document.documentElement.style.setProperty('--ink',tp.text_color);
    if(tp.hint_color)document.documentElement.style.setProperty('--ink-2',tp.hint_color);
    if(tp.button_color)document.documentElement.style.setProperty('--accent',tp.button_color);}
}catch(e){}}

(async function init(){
  S=await Store.load();
  if(!S){S=seed();await persist();}
  // подстраховка структуры
  S.tx=S.tx||[];S.goals=S.goals||[];S.budget=S.budget||{blocks:[]};S.planned=S.planned||[];S.debts=S.debts||[];
  render();
})();
</script>
